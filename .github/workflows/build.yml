name: Build

on: [push, workflow_dispatch]

env:
  PYTHON_VERSION: '3.11'
  DEPS: nuitka pyqt5 numpy scipy Pillow nbtlib numba
  NUITKA_FLAGS: >-
    --mode=onefile
    --enable-plugin=pyqt5
    --disable-console
    --noinclude-numba-mode=bytecode
    --include-package=numba
    --include-package=llvmlite
    --include-package-data=numba
    --include-package-data=llvmlite
    --nofollow-import-to=numba.tests
    --report=build-report.xml

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: main.exe
            extra_flags: --assume-yes-for-downloads
          - os: ubuntu-latest
            artifact: main.bin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache

      - run: pip install ${{ env.DEPS }}

      - run: python -m nuitka ${{ env.NUITKA_FLAGS }} ${{ matrix.extra_flags }} main.py

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.artifact }}

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-report
          path: build-report.xml
